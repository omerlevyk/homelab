apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-networking
  namespace: infra
spec:
  project: default
  destination:
    namespace: apps
    server: https://kubernetes.default.svc
  source:
    repoURL: https://gitlab.com/omerlevyk/homelab.git
    targetRevision: main
    path: gitops/charts/app-networking
    helm:
      valueFiles:
        - ../../values/apps-values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
