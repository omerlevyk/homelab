apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotify
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  destination:
    namespace: apps
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/omerlevyk/homelab.git
    targetRevision: main
    path: gitops/apps/gotify
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
