apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: apps
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/name: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          ports:
            - containerPort: 8096
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Jerusalem
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 6
          securityContext:
            privileged: true
          volumeMounts:
            - name: dri
              mountPath: /dev/dri
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            - name: media-root
              mountPath: /srv/media
            - name: media
              mountPath: /media
      volumes:
        - name: media-root
          hostPath:
            path: /srv/media
            type: Directory
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc
        - name: cache
          emptyDir: {}
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media-pvc
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
