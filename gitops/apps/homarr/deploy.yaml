apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      containers:
        - name: homarr
          image: ghcr.io/ajnart/homarr:latest
          ports:
            - containerPort: 7575
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Jerusalem
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: homarr-data
              mountPath: /app/data/configs
              subPath: configs
            - name: homarr-data
              mountPath: /app/public/icons
              subPath: icons
      volumes:
        - name: homarr-data
          persistentVolumeClaim:
            claimName: homarr-data-pvc
