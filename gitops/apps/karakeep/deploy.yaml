apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karakeep
  template:
    metadata:
      labels:
        app: karakeep
        app.kubernetes.io/name: karakeep
    spec:
      containers:
        - name: karakeep
          image: ghcr.io/karakeep-app/karakeep:release
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Jerusalem
            - name: DATA_DIR
              value: /data
            - name: NEXTAUTH_URL
              value: http://karakeep.home.arpa
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: karakeep-secrets
                  key: NEXTAUTH_SECRET
            - name: MEILI_ADDR
              value: http://karakeep-meilisearch:7700
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-secrets
                  key: MEILI_MASTER_KEY
            - name: BROWSER_WEB_URL
              value: http://127.0.0.1:9222
            - name: DB_WAL_MODE
              value: "true"
            - name: DISABLE_SIGNUPS
              value: "false"
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 20
        - name: chrome
          image: gcr.io/zenika-hub/alpine-chrome:124
          args:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
          ports:
            - containerPort: 9222
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: karakeep-data-pvc
