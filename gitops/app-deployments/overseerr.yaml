apiVersion: apps/v1
kind: Deployment
metadata:
  name: overseerr
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: overseerr
  template:
    metadata:
      labels:
        app: overseerr
        app.kubernetes.io/name: overseerr
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - chown -R 1000:1000 /app/config
          volumeMounts:
            - name: config
              mountPath: /app/config
      containers:
        - name: overseerr
          image: ghcr.io/seerr-team/seerr:latest
          ports:
            - containerPort: 5055
              protocol: TCP
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: TZ
              value: Asia/Jerusalem
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: overseerr-config-pvc
