apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-bootstrap
  namespace: apps
data:
  configuration.yaml: |
    default_config:

    homeassistant:
      name: Home
      time_zone: Asia/Jerusalem
      country: IL

    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 127.0.0.1
        - ::1
        - 10.42.0.0/16
        - 10.43.0.0/16
