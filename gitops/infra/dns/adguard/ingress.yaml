apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard
  namespace: dns
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Networking
    gethomepage.dev/name: AdGuard
    gethomepage.dev/icon: adguard-home.png
    gethomepage.dev/description: DNS and filtering
    gethomepage.dev/href: "http://adguard.home.arpa"
spec:
  ingressClassName: traefik
  rules:
    - host: adguard.omerlevy03.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard-web
                port:
                  number: 80
    - host: adguard.home.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard-web
                port:
                  number: 80
